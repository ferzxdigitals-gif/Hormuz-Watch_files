<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 920" width="800" height="920" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="800" height="920" fill="#080d14" rx="16"/>

  <!-- Title -->
  <text x="40" y="52" font-size="22" font-weight="700" fill="#00cfff" letter-spacing="3">HORMUZWATCH</text>
  <text x="40" y="74" font-size="11" fill="#8b9eb0" letter-spacing="2">COLOR PALETTE · DARK MODE</text>
  <line x1="40" y1="88" x2="760" y2="88" stroke="#1a2840" stroke-width="1"/>

  <!-- ── SECTION: Backgrounds ── -->
  <text x="40" y="116" font-size="10" font-weight="600" fill="#4a5a6a" letter-spacing="2">BACKGROUNDS</text>

  <!-- bg -->
  <rect x="40"  y="126" width="80" height="80" rx="10" fill="#080d14" stroke="#1a2840" stroke-width="1"/>
  <text x="80"  y="224" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--bg</text>
  <text x="80"  y="237" font-size="9"  fill="#8b9eb0" text-anchor="middle">#080D14</text>

  <!-- surface -->
  <rect x="136" y="126" width="80" height="80" rx="10" fill="#0c1220" stroke="#1a2840" stroke-width="1"/>
  <text x="176" y="224" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--surface</text>
  <text x="176" y="237" font-size="9"  fill="#8b9eb0" text-anchor="middle">#0C1220</text>

  <!-- card -->
  <rect x="232" y="126" width="80" height="80" rx="10" fill="#0f1a2a" stroke="#1a2840" stroke-width="1"/>
  <text x="272" y="224" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--card</text>
  <text x="272" y="237" font-size="9"  fill="#8b9eb0" text-anchor="middle">#0F1A2A</text>

  <!-- card2 -->
  <rect x="328" y="126" width="80" height="80" rx="10" fill="#111f30" stroke="#1a2840" stroke-width="1"/>
  <text x="368" y="224" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--card2</text>
  <text x="368" y="237" font-size="9"  fill="#8b9eb0" text-anchor="middle">#111F30</text>

  <!-- map-bg -->
  <rect x="424" y="126" width="80" height="80" rx="10" fill="#070c14" stroke="#1a2840" stroke-width="1"/>
  <text x="464" y="224" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--map-bg</text>
  <text x="464" y="237" font-size="9"  fill="#8b9eb0" text-anchor="middle">#070C14</text>

  <!-- border -->
  <rect x="520" y="126" width="80" height="80" rx="10" fill="#1a2840"/>
  <text x="560" y="224" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--border</text>
  <text x="560" y="237" font-size="9"  fill="#8b9eb0" text-anchor="middle">#1A2840</text>

  <!-- border-bright -->
  <rect x="616" y="126" width="80" height="80" rx="10" fill="rgba(0,207,255,0.18)" stroke="#1a2840" stroke-width="1"/>
  <text x="656" y="224" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--border-bright</text>
  <text x="656" y="237" font-size="9"  fill="#8b9eb0" text-anchor="middle">#00CFFF · 18%</text>

  <!-- ── SECTION: Accent ── -->
  <line x1="40" y1="258" x2="760" y2="258" stroke="#1a2840" stroke-width="1"/>
  <text x="40" y="278" font-size="10" font-weight="600" fill="#4a5a6a" letter-spacing="2">ACCENT</text>

  <!-- accent -->
  <rect x="40"  y="288" width="120" height="80" rx="10" fill="#00cfff"/>
  <text x="100" y="386" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--accent</text>
  <text x="100" y="399" font-size="9"  fill="#8b9eb0" text-anchor="middle">#00CFFF</text>

  <!-- accent2 -->
  <rect x="176" y="288" width="120" height="80" rx="10" fill="#38e8ff"/>
  <text x="236" y="386" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--accent2</text>
  <text x="236" y="399" font-size="9"  fill="#8b9eb0" text-anchor="middle">#38E8FF</text>

  <!-- ── SECTION: Text ── -->
  <line x1="40" y1="420" x2="760" y2="420" stroke="#1a2840" stroke-width="1"/>
  <text x="40" y="440" font-size="10" font-weight="600" fill="#4a5a6a" letter-spacing="2">TEXT</text>

  <!-- text -->
  <rect x="40"  y="450" width="80" height="80" rx="10" fill="#cdd9e5"/>
  <text x="80"  y="548" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--text</text>
  <text x="80"  y="561" font-size="9"  fill="#8b9eb0" text-anchor="middle">#CDD9E5</text>

  <!-- text-secondary -->
  <rect x="136" y="450" width="80" height="80" rx="10" fill="#8b9eb0"/>
  <text x="176" y="548" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--text-secondary</text>
  <text x="176" y="561" font-size="9"  fill="#8b9eb0" text-anchor="middle">#8B9EB0</text>

  <!-- muted -->
  <rect x="232" y="450" width="80" height="80" rx="10" fill="#4a5a6a"/>
  <text x="272" y="548" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--muted</text>
  <text x="272" y="561" font-size="9"  fill="#8b9eb0" text-anchor="middle">#4A5A6A</text>

  <!-- ── SECTION: Status ── -->
  <line x1="40" y1="582" x2="760" y2="582" stroke="#1a2840" stroke-width="1"/>
  <text x="40" y="602" font-size="10" font-weight="600" fill="#4a5a6a" letter-spacing="2">STATUS</text>

  <!-- green -->
  <rect x="40"  y="612" width="80" height="80" rx="10" fill="#10d98a"/>
  <text x="80"  y="710" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--green</text>
  <text x="80"  y="723" font-size="9"  fill="#8b9eb0" text-anchor="middle">#10D98A</text>

  <!-- red -->
  <rect x="136" y="612" width="80" height="80" rx="10" fill="#ff4d6a"/>
  <text x="176" y="710" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--red</text>
  <text x="176" y="723" font-size="9"  fill="#8b9eb0" text-anchor="middle">#FF4D6A</text>

  <!-- orange -->
  <rect x="232" y="612" width="80" height="80" rx="10" fill="#ff8c42"/>
  <text x="272" y="710" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--orange</text>
  <text x="272" y="723" font-size="9"  fill="#8b9eb0" text-anchor="middle">#FF8C42</text>

  <!-- yellow -->
  <rect x="328" y="612" width="80" height="80" rx="10" fill="#ffd166"/>
  <text x="368" y="710" font-size="10" font-weight="600" fill="#cdd9e5" text-anchor="middle">--yellow</text>
  <text x="368" y="723" font-size="9"  fill="#8b9eb0" text-anchor="middle">#FFD166</text>

  <!-- ── SECTION: Ship Types ── -->
  <line x1="40" y1="744" x2="760" y2="744" stroke="#1a2840" stroke-width="1"/>
  <text x="40" y="764" font-size="10" font-weight="600" fill="#4a5a6a" letter-spacing="2">SHIP TYPE COLORS</text>

  <!-- tanker -->
  <rect x="40"  y="774" width="72" height="40" rx="8" fill="#e74c3c"/>
  <text x="76"  y="830" font-size="9" fill="#8b9eb0" text-anchor="middle">Tanker</text>
  <text x="76"  y="842" font-size="8" fill="#4a5a6a" text-anchor="middle">#E74C3C</text>

  <!-- product -->
  <rect x="124" y="774" width="72" height="40" rx="8" fill="#e67e22"/>
  <text x="160" y="830" font-size="9" fill="#8b9eb0" text-anchor="middle">Product</text>
  <text x="160" y="842" font-size="8" fill="#4a5a6a" text-anchor="middle">#E67E22</text>

  <!-- lng -->
  <rect x="208" y="774" width="72" height="40" rx="8" fill="#3498db"/>
  <text x="244" y="830" font-size="9" fill="#8b9eb0" text-anchor="middle">LNG</text>
  <text x="244" y="842" font-size="8" fill="#4a5a6a" text-anchor="middle">#3498DB</text>

  <!-- bulk -->
  <rect x="292" y="774" width="72" height="40" rx="8" fill="#9b59b6"/>
  <text x="328" y="830" font-size="9" fill="#8b9eb0" text-anchor="middle">Bulk</text>
  <text x="328" y="842" font-size="8" fill="#4a5a6a" text-anchor="middle">#9B59B6</text>

  <!-- container -->
  <rect x="376" y="774" width="72" height="40" rx="8" fill="#2ecc71"/>
  <text x="412" y="830" font-size="9" fill="#8b9eb0" text-anchor="middle">Container</text>
  <text x="412" y="842" font-size="8" fill="#4a5a6a" text-anchor="middle">#2ECC71</text>

  <!-- cargo -->
  <rect x="460" y="774" width="72" height="40" rx="8" fill="#e84393"/>
  <text x="496" y="830" font-size="9" fill="#8b9eb0" text-anchor="middle">Cargo</text>
  <text x="496" y="842" font-size="8" fill="#4a5a6a" text-anchor="middle">#E84393</text>

  <!-- military -->
  <rect x="544" y="774" width="72" height="40" rx="8" fill="#636e72"/>
  <text x="580" y="830" font-size="9" fill="#8b9eb0" text-anchor="middle">Military</text>
  <text x="580" y="842" font-size="8" fill="#4a5a6a" text-anchor="middle">#636E72</text>

  <!-- passenger -->
  <rect x="628" y="774" width="72" height="40" rx="8" fill="#00b894"/>
  <text x="664" y="830" font-size="9" fill="#8b9eb0" text-anchor="middle">Passenger</text>
  <text x="664" y="842" font-size="8" fill="#4a5a6a" text-anchor="middle">#00B894</text>

  <!-- tug -->
  <rect x="712" y="774" width="48" height="40" rx="8" fill="#6c5ce7"/>
  <text x="736" y="830" font-size="9" fill="#8b9eb0" text-anchor="middle">Tug</text>
  <text x="736" y="842" font-size="8" fill="#4a5a6a" text-anchor="middle">#6C5CE7</text>

  <!-- Footer -->
  <line x1="40" y1="866" x2="760" y2="866" stroke="#1a2840" stroke-width="1"/>
  <text x="400" y="888" font-size="9" fill="#4a5a6a" text-anchor="middle" letter-spacing="1">HORMUZWATCH · STRAIT OF HORMUZ MARITIME INTELLIGENCE</text>
  <text x="400" y="904" font-size="8" fill="#4a5a6a" text-anchor="middle">Fonts: JetBrains Mono (data/headings) · System UI (body)</text>

</svg>
